<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Fucks | CS2 Stratbook</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;500;600;700&display=swap');

  :root {
    --bg:       #0d0f14;
    --panel:    #131620;
    --card:     #1a1e2e;
    --card-alt: #141826;
    --border:   #252a40;
    --t:        #e84560;
    --ct:       #2b8fef;
    --gold:     #f0a500;
    --green:    #27c97a;
    --text:     #c8d0e0;
    --muted:    #5a6380;
    --white:    #f0f4ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow Condensed',sans-serif; min-height:100vh; overflow-x:hidden; }

  /* ── HEADER ── */
  header {
    position:relative; background:var(--panel); border-bottom:1px solid var(--border);
    padding:0 28px; display:flex; align-items:center; justify-content:space-between; gap:20px; overflow:hidden;
  }
  header::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(90deg,rgba(232,69,96,.07) 0%,transparent 40%,rgba(43,143,239,.07) 100%);
    pointer-events:none;
  }
  .logo { display:flex; align-items:center; gap:14px; padding:14px 0; }
  .logo-icon {
    width:44px; height:44px;
    background:conic-gradient(from 135deg,var(--t),var(--ct));
    clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);
    display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;
  }
  .logo-text h1 { font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; letter-spacing:3px; color:var(--gold); text-transform:uppercase; }
  .logo-text p  { font-size:11px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; }
  .complexity { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
  .complexity-label { font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; }
  .pips { display:flex; gap:5px; }
  .pip { width:20px; height:5px; border-radius:1px; background:var(--border); transition:background .3s; }
  .pip.on { background:var(--gold); }

  /* ── MAP TABS ── */
  .map-tabs-bar {
    background:var(--panel); border-bottom:2px solid var(--border);
    display:flex; align-items:flex-end; gap:0; overflow-x:auto;
    padding:0 28px; scrollbar-width:none;
  }
  .map-tabs-bar::-webkit-scrollbar { display:none; }
  .map-tab {
    position:relative; padding:12px 20px 10px;
    font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; color:var(--muted);
    cursor:pointer; border:none; background:none; white-space:nowrap;
    border-bottom:2px solid transparent; margin-bottom:-2px;
    transition:color .2s, border-color .2s;
  }
  .map-tab:hover { color:var(--white); }
  .map-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
  .map-tab .strat-count {
    display:inline-block; font-size:10px; padding:1px 5px; border-radius:2px;
    background:rgba(240,165,0,.15); color:var(--gold); margin-left:6px;
    font-family:'Share Tech Mono',monospace; font-weight:400; letter-spacing:0;
  }
  .map-tab .strat-count.zero { background:rgba(90,99,128,.15); color:var(--muted); }

  /* ── SIDE CONTROLS ── */
  .controls {
    display:flex; align-items:center; gap:12px; padding:14px 28px;
    background:var(--panel); border-bottom:1px solid var(--border); flex-wrap:wrap;
  }
  .side-tabs { display:flex; gap:4px; }
  .tab-btn {
    padding:7px 20px; background:var(--card); border:1px solid var(--border);
    color:var(--muted); font-family:'Rajdhani',sans-serif; font-size:14px;
    font-weight:600; letter-spacing:2px; text-transform:uppercase; cursor:pointer;
    transition:all .2s; clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
  }
  .tab-btn:hover { color:var(--white); border-color:var(--muted); }
  .tab-btn.active-t  { background:rgba(232,69,96,.15); border-color:var(--t); color:var(--t); }
  .tab-btn.active-ct { background:rgba(43,143,239,.15); border-color:var(--ct); color:var(--ct); }
  .divider { width:1px; height:30px; background:var(--border); }
  .filter-label { font-size:11px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .player-filters { display:flex; gap:5px; flex-wrap:wrap; }
  .player-btn {
    padding:4px 12px; background:var(--card); border:1px solid var(--border);
    color:var(--muted); font-size:12px; letter-spacing:1px; cursor:pointer; border-radius:2px; transition:all .2s;
  }
  .player-btn:hover { color:var(--white); }
  .player-btn.active { background:rgba(240,165,0,.12); border-color:var(--gold); color:var(--gold); }
  .search-box {
    margin-left:auto; background:var(--card); border:1px solid var(--border);
    color:var(--white); padding:6px 12px; font-family:'Share Tech Mono',monospace;
    font-size:12px; outline:none; width:200px; border-radius:2px; transition:border-color .2s;
  }
  .search-box::placeholder { color:var(--muted); }
  .search-box:focus { border-color:var(--gold); }
  .buy-filters { display:flex; gap:5px; flex-wrap:wrap; }
  .buy-btn {
    padding:4px 12px; background:var(--card); border:1px solid var(--border);
    color:var(--muted); font-size:12px; letter-spacing:1px; cursor:pointer; border-radius:2px; transition:all .2s;
  }
  .buy-btn:hover { color:var(--white); }
  .buy-btn.active-pistol  { background:rgba(240,165,0,.12);  border-color:var(--gold);  color:var(--gold); }
  .buy-btn.active-full    { background:rgba(39,201,122,.12); border-color:var(--green); color:var(--green); }
  .buy-btn.active-force   { background:rgba(232,69,96,.12);  border-color:var(--t);     color:var(--t); }
  .buy-btn.active-eco     { background:rgba(232,69,96,.12);  border-color:var(--t);     color:var(--t); }
  .buy-btn.active-other   { background:rgba(43,143,239,.12); border-color:var(--ct);    color:var(--ct); }

  /* ── POSITIONS BAR ── */
  .positions-bar {
    display:flex; gap:6px; flex-wrap:wrap; padding:10px 28px;
    background:var(--panel); border-bottom:1px solid var(--border);
  }
  .pos-chip {
    display:flex; align-items:center; gap:7px; background:var(--card);
    border:1px solid var(--border); padding:4px 10px; border-radius:2px; font-size:12px;
  }
  .pos-chip .pname { font-family:'Rajdhani',sans-serif; font-weight:700; color:var(--white); letter-spacing:1px; }
  .pos-chip .ppos  { color:var(--muted); }
  .pos-chip.t-pos  .ppos { color:var(--t); }
  .pos-chip.ct-pos .ppos { color:var(--ct); }

  /* ── MAIN ── */
  main { padding:20px 28px; display:flex; flex-direction:column; gap:7px; }

  /* ── STRAT CARD ── */
  .strat-card {
    background:var(--card); border:1px solid var(--border); border-left:3px solid transparent;
    transition:border-color .2s, transform .15s; cursor:pointer; animation:fadeIn .25s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
  .strat-card:hover { transform:translateX(2px); }
  .strat-card.t-card  { border-left-color:var(--t); }
  .strat-card.ct-card { border-left-color:var(--ct); }
  .strat-card.hidden  { display:none !important; }

  .card-header {
    display:flex; align-items:center; gap:14px; padding:11px 15px;
    border-bottom:1px solid transparent; transition:border-color .2s; user-select:none;
  }
  .strat-card.open .card-header { border-bottom-color:var(--border); }
  .card-name { font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; letter-spacing:2px; color:var(--white); text-transform:uppercase; flex:1; }
  .card-setup {
    font-size:11px; letter-spacing:2px; color:var(--muted); text-transform:uppercase;
    background:var(--card-alt); border:1px solid var(--border); padding:3px 9px; border-radius:2px;
  }
  .card-setup.pistol  { border-color:rgba(240,165,0,.4);  color:var(--gold); }
  .card-setup.eco     { border-color:rgba(232,69,96,.4);  color:var(--t); }
  .card-setup.full    { border-color:rgba(39,201,122,.4); color:var(--green); }
  .chevron { color:var(--muted); font-size:17px; transition:transform .25s; line-height:1; }
  .strat-card.open .chevron { transform:rotate(180deg); }
  .card-notes { padding:7px 15px; font-size:12px; color:var(--muted); font-style:italic; border-bottom:1px solid var(--border); display:none; }
  .strat-card.open .card-notes { display:block; }
  .player-table { display:none; }
  .strat-card.open .player-table { display:block; }
  .player-row {
    display:grid; grid-template-columns:130px 1fr;
    border-bottom:1px solid var(--border); transition:background .15s;
  }
  .player-row:last-child { border-bottom:none; }
  .player-row:hover { background:rgba(255,255,255,.02); }
  .player-row.highlight { background:rgba(240,165,0,.06); }
  .player-row.highlight .player-name { color:var(--gold); }
  .player-name {
    padding:9px 14px; font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700;
    letter-spacing:1px; color:var(--white); text-transform:uppercase; border-right:1px solid var(--border);
    display:flex; align-items:center;
  }
  .player-resp { padding:9px 14px; font-size:13px; color:var(--text); display:flex; align-items:center; line-height:1.5; gap:8px; }
  .resp-tag {
    display:inline-block; font-family:'Share Tech Mono',monospace; font-size:10px;
    padding:1px 6px; border-radius:1px; flex-shrink:0;
    background:rgba(43,143,239,.15); color:var(--ct); border:1px solid rgba(43,143,239,.3);
  }
  .resp-tag.t-tag { background:rgba(232,69,96,.15); color:var(--t); border-color:rgba(232,69,96,.3); }

  /* ── EMPTY / COMING SOON ── */
  .empty-state { text-align:center; padding:50px 28px; color:var(--muted); font-size:15px; letter-spacing:2px; text-transform:uppercase; display:none; }
  .coming-soon {
    text-align:center; padding:60px 28px;
    display:none; flex-direction:column; align-items:center; gap:14px;
  }
  .coming-soon.show { display:flex; }
  .coming-soon-icon { font-size:42px; opacity:.25; }
  .coming-soon h3 { font-family:'Rajdhani',sans-serif; font-size:20px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; }
  .coming-soon p { font-size:13px; color:var(--muted); letter-spacing:1px; max-width:400px; }

  footer {
    text-align:center; padding:18px; color:var(--muted); font-size:10px; letter-spacing:2px;
    text-transform:uppercase; border-top:1px solid var(--border); margin-top:20px;
  }
  footer span { color:var(--gold); }
</style>
</head>

<main id="stratList">

        { name:"Mid Popflash Bomba", setup:"Force Buy", notes:"Flash-heavy mid push on a force buy. Aaron coordinates util chain.", players:[
          {name:"Lucas",       resp:"ELBOW",     detail:"Buy 2x flashes and drop for Aaron, wait elbow"},

          {name:"Jack",        resp:"ELBOW",     detail:"Buy 2x flashes and drop for Aaron, wait elbow"},
          {name:"Aaron",       resp:"UTIL",      detail:"Buy 2x flashes, throw after initial util hit mid"},
          {name:"Oliver/Ryan", resp:"ELBOW",     detail:"Wait elbow"},
        ]},
      ]
    }
  },

  NUKE: {

    positions: {

    },
    strats: {
      CT: [],
      T: [
        { name:"Oliver Special", setup:"Pistol", notes:"Outside aggro with squeaky link-up. Aaron drops Oliver's smoke, flashes through.", players:[
          {name:"Lucas",       resp:"OUTSIDE",   detail:"Outside, contact, go through smokes to main on flash"},
          {name:"Neo",         resp:"OUTSIDE",   detail:"Outside, contact, go through smokes to main on flash"},
          {name:"Jack",        resp:"SQUEAKY",   detail:"Squeaky, contact on outside flash pop"},
          {name:"Aaron",       resp:"UTIL",      detail:"Outside — drop Oliver smoke, flash through outside smokes. BUY SMOKE + 2 FLASHES"},
          {name:"Oliver/Ryan", resp:"SMOKES",    detail:"Outside smokes, link up with squeaky"},
        ]},
      ]
    }
  },

  MIRAGE: {
    complexity: 1,
    positions: {
      CT: { Ryan:"Cat", Hibsen:"Awper", Neo:"Connector", Jaake:"B Anchor", LTU:"A Anchor" },
      T:  { "Player 1":"Pack", "Player 2":"Awper", "Player 3":"Middle", "Player 4":"B Halls", "Player 5":"A Lurk" }
    },
    strats: { CT: [], T: [] }
  },

  INFERNO: {
    complexity: 1,
    positions: {
      CT: { "Player 1":"B Support", "Player 2":"Awper", "Player 3":"Lane", "Player 4":"B Anchor", "Player 5":"Pit" },
      T:  { "Player 1":"Banana", "Player 2":"Awper", "Player 3":"Alt Mid", "Player 4":"Banana Support", "Player 5":"Alt Mid Support" }
    },
    strats: { CT: [], T: [] }
  },

  OVERPASS: {
    complexity: 1,
    positions: {
      CT: { "Player 1":"Monster", "Player 2":"Rotate", "Player 3":"Awper", "Player 4":"A Rifler", "Player 5":"Short" },
      T:  { "Player 1":"Monster", "Player 2":"Pack", "Player 3":"Awper", "Player 4":"Playground", "Player 5":"Connector" }
    },
    strats: { CT: [], T: [] }
  },

  ANUBIS: {
    complexity: 1,
    positions: {
      CT: { "Player 1":"Connector", "Player 2":"Middle", "Player 3":"Awper", "Player 4":"A Anchor", "Player 5":"B Anchor" },
      T:  { "Player 1":"Canals", "Player 2":"Middle", "Player 3":"Awper", "Player 4":"A Lurk", "Player 5":"B Lurk" }
    },
    strats: { CT: [], T: [] }
  },

  TRAIN: {
    complexity: 1,
    positions: {
      CT: { "Player 1":"Connector", "Player 2":"Middle", "Player 3":"Awper", "Player 4":"A Anchor", "Player 5":"B Anchor" },
      T:  { "Player 1":"Canals", "Player 2":"Middle", "Player 3":"Awper", "Player 4":"A Lurk", "Player 5":"B Lurk" }
    },
    strats: { CT: [], T: [] }
  },

  "DUST II": {
    complexity: 1,
    positions: {
      CT: { "Player 1":"Connector", "Player 2":"Middle", "Player 3":"Awper", "Player 4":"A Anchor", "Player 5":"B Anchor" },
      T:  { "Player 1":"Canals", "Player 2":"Middle", "Player 3":"Awper", "Player 4":"A Lurk", "Player 5":"B Lurk" }
    },
    strats: { CT: [], T: [] }
  },

  VERTIGO: {
    complexity: 1,
    positions: {
      CT: { "Player 1":"B Anchor", "Player 2":"Middle", "Player 3":"Ramp", "Player 4":"Ramp Support", "Player 5":"Awper" },
      T:  { "Player 1":"B Stairs", "Player 2":"Middle", "Player 3":"A Ramp", "Player 4":"Pack", "Player 5":"Awper" }
    },
    strats: { CT: [], T: [] }
  },
};

const MAP_ORDER = ["ANCIENT","NUKE","MIRAGE","INFERNO","OVERPASS","ANUBIS","TRAIN","DUST II","VERTIGO"];

// ── State ────────────────────────────────────────────────────────────────────
let currentMap    = "ANCIENT";
let currentSide   = "T";
let activePlayer  = null;
let activeBuy     = null;
let openCards     = {};  // key: `MAP-SIDE-idx`

// Normalise a setup string to a buy bucket key
function buyBucket(setup) {
  const s = setup.toLowerCase();
  if (s.includes('pistol'))           return 'pistol';
  if (s.includes('full'))             return 'full';
  if (s.includes('force'))            return 'force';
  if (s.includes('eco'))              return 'eco';
  return 'other'; // Standard, Any, -
}

const BUY_LABELS = {
  pistol: 'Pistol',
  full:   'Full Buy',
  force:  'Force',
  eco:    'Eco',
  other:  'Standard / Any',
};

// ── Helpers ──────────────────────────────────────────────────────────────────
function totalStrats(mapKey) {
  const m = MAPS[mapKey];
  return m.strats.T.length + m.strats.CT.length;
}

function setupClass(setup) {
  const s = setup.toLowerCase();
  if (s.includes('pistol')) return 'pistol';
  if (s.includes('full'))   return 'full';
  if (s.includes('eco') || s.includes('force')) return 'eco';
  return '';
}

// ── Build map tabs ────────────────────────────────────────────────────────────
function buildMapTabs() {
  const bar = document.getElementById("mapTabsBar");
  bar.innerHTML = "";
  MAP_ORDER.forEach(mapKey => {
    const count = totalStrats(mapKey);
    const btn = document.createElement("button");
    btn.className = "map-tab" + (mapKey === currentMap ? " active" : "");
    btn.innerHTML = `${mapKey} <span class="strat-count ${count === 0 ? 'zero' : ''}">${count}</span>`;
    btn.onclick = () => { currentMap = mapKey; activePlayer = null; render(); };
    bar.appendChild(btn);
  });
}

// ── Build positions bar ───────────────────────────────────────────────────────
function buildPositions() {
  const bar = document.getElementById("positionsBar");
  const mapData = MAPS[currentMap];
  const pos = mapData.positions[currentSide];
  bar.innerHTML = "";
  Object.entries(pos).forEach(([player, position]) => {
    const chip = document.createElement("div");
    chip.className = `pos-chip ${currentSide.toLowerCase()}-pos`;
    chip.innerHTML = `<span class="pname">${player}</span><span class="ppos">→ ${position}</span>`;
    bar.appendChild(chip);
  });
}

// ── Build complexity ──────────────────────────────────────────────────────────
function buildComplexity() {
  const lvl = MAPS[currentMap].complexity;
  document.querySelectorAll('.pip').forEach((p, i) => p.classList.toggle('on', i < lvl));
}

// ── Build player filters ──────────────────────────────────────────────────────
function buildFilters() {
  const container = document.getElementById("playerFilters");
  const pos = MAPS[currentMap].positions[currentSide];
  const players = Object.keys(pos);
  container.innerHTML = "";
  players.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "player-btn" + (activePlayer === p ? " active" : "");
    btn.textContent = p;
    btn.onclick = () => { activePlayer = activePlayer === p ? null : p; buildFilters(); filterStrats(); };
    container.appendChild(btn);
  });
}

// ── Build buy filters ─────────────────────────────────────────────────────────
function buildBuyFilters() {
  const container = document.getElementById("buyFilters");
  const strats = MAPS[currentMap].strats[currentSide];
  // Collect which buckets actually exist for this map+side
  const present = [...new Set(strats.map(s => buyBucket(s.setup)))];
  container.innerHTML = "";
  present.forEach(bucket => {
    const btn = document.createElement("button");
    const isActive = activeBuy === bucket;
    btn.className = "buy-btn" + (isActive ? ` active-${bucket}` : "");
    btn.textContent = BUY_LABELS[bucket];
    btn.onclick = () => { activeBuy = activeBuy === bucket ? null : bucket; buildBuyFilters(); filterStrats(); };
    container.appendChild(btn);
  });
}


function buildCards() {
  const list = document.getElementById("stratList");
  const emptyEl = document.getElementById("emptyState");
  const comingSoon = document.getElementById("comingSoon");

  // Clear everything except persistent els
  list.querySelectorAll(".strat-card").forEach(c => c.remove());
  emptyEl.style.display = "none";
  comingSoon.classList.remove("show");

  const strats = MAPS[currentMap].strats[currentSide];
  const sideClass = currentSide === "T" ? "t-card" : "ct-card";
  const isT = currentSide === "T";

  if (strats.length === 0) {
    comingSoon.classList.add("show");
    return;
  }

  strats.forEach((strat, idx) => {
    const key = `${currentMap}-${currentSide}-${idx}`;
    const card = document.createElement("div");
    card.className = `strat-card ${sideClass}`;
    card.dataset.idx     = idx;
    card.dataset.players = strat.players.map(p => p.name.toLowerCase()).join(",");
    card.dataset.name    = strat.name.toLowerCase();
    card.dataset.notes   = (strat.notes || "").toLowerCase();
    card.dataset.setup   = buyBucket(strat.setup);
    if (openCards[key]) card.classList.add("open");

    const sc = setupClass(strat.setup);
    const rowsHtml = strat.players.map(pl => `
      <div class="player-row">
        <div class="player-name">${pl.name}</div>
        <div class="player-resp">
          <span class="resp-tag ${isT ? 't-tag' : ''}">${pl.resp}</span>
          ${pl.detail}
        </div>
      </div>`).join("");

    card.innerHTML = `
      <div class="card-header" onclick="toggleCard(this.parentElement)">
        <div class="card-name">${strat.name}</div>
        <div class="card-setup ${sc}">${strat.setup}</div>
        <div class="chevron">▾</div>
      </div>
      <div class="card-notes">${strat.notes || ''}</div>
      <div class="player-table">${rowsHtml}</div>`;

    list.appendChild(card);
  });
}

function toggleCard(card) {
  const idx = parseInt(card.dataset.idx);
  const key = `${currentMap}-${currentSide}-${idx}`;
  if (card.classList.contains("open")) { card.classList.remove("open"); delete openCards[key]; }
  else { card.classList.add("open"); openCards[key] = true; }
}

// ── Filter ────────────────────────────────────────────────────────────────────
function filterStrats() {
  const query = document.getElementById("searchBox").value.toLowerCase();
  let visible = 0;
  document.querySelectorAll(".strat-card").forEach(card => {
    const nameMatch   = card.dataset.name.includes(query);
    const noteMatch   = card.dataset.notes.includes(query);
    const playerMatch = activePlayer ? card.dataset.players.includes(activePlayer.toLowerCase()) : true;
    const buyMatch    = activeBuy    ? card.dataset.setup === activeBuy : true;
    const queryMatch  = !query || nameMatch || noteMatch || card.dataset.players.includes(query);
    const show = playerMatch && buyMatch && queryMatch;
    card.classList.toggle("hidden", !show);
    if (show) visible++;

    card.querySelectorAll(".player-row").forEach(row => {
      const pname = row.querySelector(".player-name")?.textContent.trim();
      row.classList.toggle("highlight", !!activePlayer && pname === activePlayer);
    });
  });
  const emptyEl = document.getElementById("emptyState");
  emptyEl.style.display = (visible === 0 && !document.getElementById("comingSoon").classList.contains("show")) ? "block" : "none";
}

// ── Side switch ───────────────────────────────────────────────────────────────
function setSide(side) {
  currentSide = side;
  activePlayer = null;
  activeBuy = null;
  document.getElementById("btnT").className  = "tab-btn" + (side === "T"  ? " active-t"  : "");
  document.getElementById("btnCT").className = "tab-btn" + (side === "CT" ? " active-ct" : "");
  buildPositions();
  buildFilters();
  buildBuyFilters();
  buildCards();
  filterStrats();
}

// ── Full render ───────────────────────────────────────────────────────────────
function render() {
  document.getElementById("searchBox").value = "";
  activePlayer = null;
  activeBuy = null;
  buildMapTabs();
  buildComplexity();
  buildPositions();
  buildFilters();
  buildBuyFilters();
  buildCards();
  filterStrats();
  document.getElementById("btnT").className  = "tab-btn" + (currentSide === "T"  ? " active-t"  : "");
  document.getElementById("btnCT").className = "tab-btn" + (currentSide === "CT" ? " active-ct" : "");
}

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
