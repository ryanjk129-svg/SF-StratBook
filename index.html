<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Fucks | CS2 Stratbook</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;500;600;700&display=swap');

  :root {
    --bg:#0d0f14; --panel:#131620; --card:#1a1e2e; --card-alt:#141826;
    --border:#252a40; --t:#e84560; --ct:#2b8fef; --gold:#f0a500;
    --green:#27c97a; --text:#c8d0e0; --muted:#5a6380; --white:#f0f4ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow Condensed',sans-serif; min-height:100vh; overflow-x:hidden; }

  /* ── SYNC STATUS STRIP ── */
  .sync-strip {
    background:var(--panel); border-bottom:1px solid var(--border);
    padding:6px 28px; display:flex; align-items:center; gap:8px;
  }
  .sync-status { font-family:'Share Tech Mono',monospace; font-size:11px; display:flex; align-items:center; gap:6px; }
  .sync-status.ok      { color:var(--green); }
  .sync-status.err     { color:var(--t); }
  .sync-status.loading { color:var(--gold); }
  .sync-dot { width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0; }
  .sync-dot.pulse { animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ── HEADER ── */
  header { position:relative; background:var(--panel); border-bottom:1px solid var(--border); padding:0 28px; display:flex; align-items:center; justify-content:space-between; gap:20px; overflow:hidden; }
  header::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,rgba(232,69,96,.07) 0%,transparent 40%,rgba(43,143,239,.07) 100%); pointer-events:none; }
  .logo { display:flex; align-items:center; gap:14px; padding:14px 0; }
  .logo-icon { width:44px; height:44px; background:conic-gradient(from 135deg,var(--t),var(--ct)); clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .logo-text h1 { font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; letter-spacing:3px; color:var(--gold); text-transform:uppercase; }
  .logo-text p  { font-size:11px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; }
  .complexity { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
  .complexity-label { font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; }
  .pips { display:flex; gap:5px; }
  .pip { width:20px; height:5px; border-radius:1px; background:var(--border); transition:background .3s; }
  .pip.on { background:var(--gold); }

  /* ── MAP TABS ── */
  .map-tabs-bar { background:var(--panel); border-bottom:2px solid var(--border); display:flex; align-items:flex-end; overflow-x:auto; padding:0 28px; scrollbar-width:none; }
  .map-tabs-bar::-webkit-scrollbar { display:none; }
  .map-tab { position:relative; padding:12px 20px 10px; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); cursor:pointer; border:none; background:none; white-space:nowrap; border-bottom:2px solid transparent; margin-bottom:-2px; transition:color .2s,border-color .2s; }
  .map-tab:hover { color:var(--white); }
  .map-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
  .map-tab .strat-count { display:inline-block; font-size:10px; padding:1px 5px; border-radius:2px; background:rgba(240,165,0,.15); color:var(--gold); margin-left:6px; font-family:'Share Tech Mono',monospace; font-weight:400; letter-spacing:0; }
  .map-tab .strat-count.zero { background:rgba(90,99,128,.15); color:var(--muted); }

  /* ── CONTROLS ── */
  .controls { display:flex; align-items:center; gap:12px; padding:14px 28px; background:var(--panel); border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .side-tabs { display:flex; gap:4px; }
  .tab-btn { padding:7px 20px; background:var(--card); border:1px solid var(--border); color:var(--muted); font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s; clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%); }
  .tab-btn:hover { color:var(--white); border-color:var(--muted); }
  .tab-btn.active-t  { background:rgba(232,69,96,.15); border-color:var(--t); color:var(--t); }
  .tab-btn.active-ct { background:rgba(43,143,239,.15); border-color:var(--ct); color:var(--ct); }
  .divider { width:1px; height:30px; background:var(--border); }
  .filter-label { font-size:11px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .player-filters,.buy-filters { display:flex; gap:5px; flex-wrap:wrap; }
  .player-btn,.buy-btn { padding:4px 12px; background:var(--card); border:1px solid var(--border); color:var(--muted); font-size:12px; letter-spacing:1px; cursor:pointer; border-radius:2px; transition:all .2s; }
  .player-btn:hover,.buy-btn:hover { color:var(--white); }
  .player-btn.active     { background:rgba(240,165,0,.12); border-color:var(--gold); color:var(--gold); }
  .buy-btn.active-pistol { background:rgba(240,165,0,.12); border-color:var(--gold); color:var(--gold); }
  .buy-btn.active-full   { background:rgba(39,201,122,.12); border-color:var(--green); color:var(--green); }
  .buy-btn.active-force,.buy-btn.active-eco { background:rgba(232,69,96,.12); border-color:var(--t); color:var(--t); }
  .buy-btn.active-other  { background:rgba(43,143,239,.12); border-color:var(--ct); color:var(--ct); }
  .search-box { margin-left:auto; background:var(--card); border:1px solid var(--border); color:var(--white); padding:6px 12px; font-family:'Share Tech Mono',monospace; font-size:12px; outline:none; width:200px; border-radius:2px; transition:border-color .2s; }
  .search-box::placeholder { color:var(--muted); }
  .search-box:focus { border-color:var(--gold); }

  /* ── POSITIONS BAR ── */
  .positions-bar { display:flex; gap:6px; flex-wrap:wrap; padding:10px 28px; background:var(--panel); border-bottom:1px solid var(--border); }
  .pos-chip { display:flex; align-items:center; gap:7px; background:var(--card); border:1px solid var(--border); padding:4px 10px; border-radius:2px; font-size:12px; }
  .pos-chip .pname { font-family:'Rajdhani',sans-serif; font-weight:700; color:var(--white); letter-spacing:1px; }
  .pos-chip .ppos  { color:var(--muted); }
  .pos-chip.t-pos  .ppos { color:var(--t); }
  .pos-chip.ct-pos .ppos { color:var(--ct); }

  /* ── MAIN ── */
  main { padding:20px 28px; display:flex; flex-direction:column; gap:7px; }

  /* ── STRAT CARD ── */
  .strat-card { background:var(--card); border:1px solid var(--border); border-left:3px solid transparent; transition:border-color .2s,transform .15s; cursor:pointer; animation:fadeIn .25s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
  .strat-card:hover { transform:translateX(2px); }
  .strat-card.t-card  { border-left-color:var(--t); }
  .strat-card.ct-card { border-left-color:var(--ct); }
  .strat-card.hidden  { display:none !important; }
  .card-header { display:flex; align-items:center; gap:14px; padding:11px 15px; border-bottom:1px solid transparent; transition:border-color .2s; user-select:none; }
  .strat-card.open .card-header { border-bottom-color:var(--border); }
  .card-name { font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; letter-spacing:2px; color:var(--white); text-transform:uppercase; flex:1; }
  .card-setup { font-size:11px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; background:var(--card-alt); border:1px solid var(--border); padding:3px 9px; border-radius:2px; }
  .card-setup.pistol { border-color:rgba(240,165,0,.4);  color:var(--gold); }
  .card-setup.eco    { border-color:rgba(232,69,96,.4);  color:var(--t); }
  .card-setup.full   { border-color:rgba(39,201,122,.4); color:var(--green); }
  .chevron { color:var(--muted); font-size:17px; transition:transform .25s; line-height:1; }
  .strat-card.open .chevron { transform:rotate(180deg); }
  .card-notes { padding:7px 15px; font-size:12px; color:var(--muted); font-style:italic; border-bottom:1px solid var(--border); display:none; }
  .strat-card.open .card-notes { display:block; }
  .player-table { display:none; }
  .strat-card.open .player-table { display:block; }
  .player-row { display:grid; grid-template-columns:130px 1fr; border-bottom:1px solid var(--border); transition:background .15s; }
  .player-row:last-child { border-bottom:none; }
  .player-row:hover { background:rgba(255,255,255,.02); }
  .player-row.highlight { background:rgba(240,165,0,.06); }
  .player-row.highlight .player-name { color:var(--gold); }
  .player-name { padding:9px 14px; font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; letter-spacing:1px; color:var(--white); text-transform:uppercase; border-right:1px solid var(--border); display:flex; align-items:center; }
  .player-resp { padding:9px 14px; font-size:13px; color:var(--text); display:flex; align-items:center; line-height:1.5; gap:8px; }
  .resp-tag { display:inline-block; font-family:'Share Tech Mono',monospace; font-size:10px; padding:1px 6px; border-radius:1px; flex-shrink:0; background:rgba(43,143,239,.15); color:var(--ct); border:1px solid rgba(43,143,239,.3); }
  .resp-tag.t-tag { background:rgba(232,69,96,.15); color:var(--t); border-color:rgba(232,69,96,.3); }

  /* ── STATES ── */
  .empty-state { text-align:center; padding:50px 28px; color:var(--muted); font-size:15px; letter-spacing:2px; text-transform:uppercase; display:none; }
  .coming-soon { text-align:center; padding:60px 28px; display:none; flex-direction:column; align-items:center; gap:14px; }
  .coming-soon.show { display:flex; }
  .coming-soon-icon { font-size:42px; opacity:.25; }
  .coming-soon h3 { font-family:'Rajdhani',sans-serif; font-size:20px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; }
  .coming-soon p { font-size:13px; color:var(--muted); letter-spacing:1px; max-width:400px; }

  footer { text-align:center; padding:18px; color:var(--muted); font-size:10px; letter-spacing:2px; text-transform:uppercase; border-top:1px solid var(--border); margin-top:20px; }
  footer span { color:var(--gold); }
</style>
</head>

const MAP_ORDER = ["ANCIENT","NUKE","MIRAGE","INFERNO","OVERPASS","ANUBIS","TRAIN","DUST II"];
let MAPS = JSON.parse(JSON.stringify(FALLBACK));

// ═══════════════════════════════════════════
// CSV PARSER
// ═══════════════════════════════════════════
function parseCSV(text) {
  const rows = []; let row=[], field='', inQ=false;
  for (let i=0; i<text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c==='"') { if (text[i+1]==='"'){field+='"';i++;}else inQ=false; }
      else field+=c;
    } else {
      if      (c==='"')  { inQ=true; }
      else if (c===',')  { row.push(field.trim()); field=''; }
      else if (c==='\n') { row.push(field.trim()); if(row.some(Boolean))rows.push(row); row=[]; field=''; }
      else if (c!=='\r') { field+=c; }
    }
  }
  if (field||row.length){ row.push(field.trim()); if(row.some(Boolean))rows.push(row); }
  return rows;
}

// "3RD ENTRY, Buy smoke..." → {resp:'3RD ENTRY', detail:'Buy smoke...'}
// "B main/lane hold"       → {resp:'',           detail:'B main/lane hold'}
function parseResp(text) {
  if (!text) return {resp:'', detail:''};
  const m = text.match(/^([A-Z0-9 \/#&]+),\s*(.+)$/s);
  if (m) return {resp: m[1].trim(), detail: m[2].trim()};
  return {resp:'', detail: text.trim()};
}

function parseSheetData(rows) {
  const result = { complexity:1, positions:{CT:{},T:{}}, strats:{CT:[],T:[]} };

  // Positions: col[9]=name, col[11]=position. Skip numeric/placeholder rows.
  const SKIP = new Set(['1','2','3','1.0','2.0','3.0']);
  let posRows = [];
  for (const row of rows) {
    const name=(row[9]||'').trim(), pos=(row[11]||'').trim();
    if (name && pos && !SKIP.has(name) && !/^\d+(\.\d+)?$/.test(name)
        && !name.toLowerCase().includes('name here'))
      posRows.push([name,pos]);
  }
  posRows.slice(0,5).forEach(([n,p])=>result.positions.CT[n]=p);
  posRows.slice(5,10).forEach(([n,p])=>result.positions.T[n]=p);

  // Complexity: look for lone "What level" answer in col[0]
  let nextIsLevel=false;
  for (const row of rows) {
    if (nextIsLevel) {
      const v=parseFloat(row[9]);
      if ([1,2,3].includes(v)) result.complexity=v;
      nextIsLevel=false;
    }
    if ((row[9]||'').toLowerCase().includes('what level')) nextIsLevel = true;
  }

  // Strats: col[0]=tactic, col[1]=side, col[2]=setup, col[3]=player, col[4]=resp, col[14]=notes
  let tactic=null,side=null,setup=null,notes=null,players=[];
  function flush() {
    if (tactic && players.length && (side==='T'||side==='CT'))
      result.strats[side].push({name:tactic,setup:setup||'Standard',notes:notes||'',players:[...players]});
    tactic=null;side=null;setup=null;notes=null;players=[];
  }
  for (const row of rows) {
    const c0=(row[0]||'').trim(), c1=(row[1]||'').trim(), c2=(row[2]||'').trim(),
          c3=(row[3]||'').trim(), c4=(row[4]||'').trim(), c14=(row[14]||'').trim();
    if (c0==='TACTIC'||c0==='COUNTER-TERRORIST'||c0==='TERRORIST'){flush();continue;}
    if (c1==='-'&&c2==='-') continue;
    if (c0&&(c1==='T'||c1==='CT')&&c3) {
      flush();
      tactic=c0; side=c1; setup=c2||'Standard'; notes=c14;
      const {resp,detail}=parseResp(c4);
      players=[{name:c3,resp,detail:detail||c4}];
    } else if (!c0&&c3&&tactic) {
      const {resp,detail}=parseResp(c4);
      players.push({name:c3,resp,detail:detail||c4});
    }
  }
  flush();
  return result;
}

// GOOGLE SHEETS FETCH  (hardcoded sheet)
// ═══════════════════════════════════════════
const SHEET_ID = '1r4kputDft3a0cqd__A55lKPjgRa0rA5YiXIk2D7QJWM';

const TAB_GIDS = {
  'ANCIENT':  '1528962395',
  'NUKE':     '1945370285',
  'MIRAGE':   '1809042707',
  'INFERNO':  '1740690180',
  'OVERPASS': '267790782',
  'ANUBIS':   '386735560',
  'TRAIN':    '566240368',
  'DUST II':  '529120844',
};

function setStatus(msg,type) {
  const el=document.getElementById('syncStatus');
  el.className=`sync-status ${type}`;
  el.innerHTML=`<div class="sync-dot${type==='loading'?' pulse':''}"></div>${msg}`;
}

async function loadSheet() {
  setStatus('Loading from Google Sheets…','loading');
  const newMaps = JSON.parse(JSON.stringify(FALLBACK));
  const errors  = [];

  await Promise.all(MAP_ORDER.map(async mapKey => {
    const gid = TAB_GIDS[mapKey];
    if (!gid) return; // no gid = skip (e.g. Vertigo)
    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
      const res  = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      if (text.includes('<html') || text.includes('<!DOCTYPE'))
        throw new Error('Got HTML instead of CSV — check publish settings');
      newMaps[mapKey] = parseSheetData(parseCSV(text));
    } catch(e) {
      console.error(`${mapKey} failed:`, e);
      errors.push(`${mapKey}: ${e.message}`);
    }
  }));

  MAPS = newMaps;
  currentMap = 'ANCIENT'; currentSide = 'T';
  render();

  if (errors.length === 0) {
    setStatus('Live — synced from Google Sheets','ok');
  } else if (errors.length < Object.keys(TAB_GIDS).length) {
    setStatus(`Partial sync (${Object.keys(TAB_GIDS).length - errors.length}/${Object.keys(TAB_GIDS).length} maps loaded)`,'ok');
  } else {
    setStatus('Failed to load — check sheet publish settings','err');
  }
}

// ═══════════════════════════════════════════
// STATE + HELPERS
// ═══════════════════════════════════════════
let currentMap='ANCIENT', currentSide='T', activePlayer=null, activeBuy=null, openCards={};

function buyBucket(s){
  s=(s||'').toLowerCase();
  if(s.includes('pistol')) return 'pistol';
  if(s.includes('full'))   return 'full';
  if(s.includes('force'))  return 'force';
  if(s.includes('eco'))    return 'eco';
  return 'other';
}
const BUY_LABELS={pistol:'Pistol',full:'Full Buy',force:'Force',eco:'Eco',other:'Standard / Any'};
function setupClass(s){
  s=(s||'').toLowerCase();
  if(s.includes('pistol')) return 'pistol';
  if(s.includes('full'))   return 'full';
  if(s.includes('eco')||s.includes('force')) return 'eco';
  return '';
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function totalStrats(k){ const m=MAPS[k]; return (m?.strats?.T?.length||0)+(m?.strats?.CT?.length||0); }

function buildMapTabs(){
  const bar=document.getElementById('mapTabsBar'); bar.innerHTML='';
  MAP_ORDER.forEach(k=>{
    const n=totalStrats(k), btn=document.createElement('button');
    btn.className='map-tab'+(k===currentMap?' active':'');
    btn.innerHTML=`${k} <span class="strat-count ${n===0?'zero':''}">${n}</span>`;
    btn.onclick=()=>{currentMap=k;activePlayer=null;activeBuy=null;render();};
    bar.appendChild(btn);
  });
}
function buildPositions(){
  const bar=document.getElementById('positionsBar'), pos=MAPS[currentMap]?.positions?.[currentSide]||{};
  bar.innerHTML='';
  Object.entries(pos).forEach(([p,v])=>{
    if(!p||!v) return;
    const c=document.createElement('div');
    c.className=`pos-chip ${currentSide.toLowerCase()}-pos`;
    c.innerHTML=`<span class="pname">${p}</span><span class="ppos">→ ${v}</span>`;
    bar.appendChild(c);
  });
}
function buildComplexity(){
  const lvl=MAPS[currentMap]?.complexity||1;
  document.querySelectorAll('.pip').forEach((p,i)=>p.classList.toggle('on',i<lvl));
}
function buildFilters(){
  const cont=document.getElementById('playerFilters'), pos=MAPS[currentMap]?.positions?.[currentSide]||{};
  cont.innerHTML='';
  Object.keys(pos).forEach(p=>{
    if(!p) return;
    const btn=document.createElement('button');
    btn.className='player-btn'+(activePlayer===p?' active':'');
    btn.textContent=p;
    btn.onclick=()=>{activePlayer=activePlayer===p?null:p;buildFilters();filterStrats();};
    cont.appendChild(btn);
  });
}
function buildBuyFilters(){
  const cont=document.getElementById('buyFilters'), strats=MAPS[currentMap]?.strats?.[currentSide]||[];
  const present=[...new Set(strats.map(s=>buyBucket(s.setup)))];
  cont.innerHTML='';
  present.forEach(b=>{
    const btn=document.createElement('button');
    btn.className='buy-btn'+(activeBuy===b?` active-${b}`:'');
    btn.textContent=BUY_LABELS[b];
    btn.onclick=()=>{activeBuy=activeBuy===b?null:b;buildBuyFilters();filterStrats();};
    cont.appendChild(btn);
  });
}
function buildCards(){
  const list=document.getElementById('stratList');
  list.querySelectorAll('.strat-card').forEach(c=>c.remove());
  document.getElementById('emptyState').style.display='none';
  const cs=document.getElementById('comingSoon');
  cs.classList.remove('show');
  const strats=MAPS[currentMap]?.strats?.[currentSide]||[];
  if(!strats.length){cs.classList.add('show');return;}
  const sc=currentSide==='T'?'t-card':'ct-card', isT=currentSide==='T';
  strats.forEach((s,idx)=>{
    const key=`${currentMap}-${currentSide}-${idx}`, card=document.createElement('div');
    card.className=`strat-card ${sc}`;
    card.dataset.idx=idx;
    card.dataset.players=s.players.map(p=>p.name.toLowerCase()).join(',');
    card.dataset.name=s.name.toLowerCase();
    card.dataset.notes=(s.notes||'').toLowerCase();
    card.dataset.setup=buyBucket(s.setup);
    if(openCards[key]) card.classList.add('open');
    const rows=s.players.map(pl=>{
      const hasTag=pl.resp&&pl.resp.trim();
      return `<div class="player-row">
        <div class="player-name">${pl.name}</div>
        <div class="player-resp">
          ${hasTag?`<span class="resp-tag ${isT?'t-tag':''}">${pl.resp}</span>`:''}
          ${pl.detail||pl.resp}
        </div></div>`;
    }).join('');
    card.innerHTML=`
      <div class="card-header" onclick="toggleCard(this.parentElement)">
        <div class="card-name">${s.name}</div>
        <div class="card-setup ${setupClass(s.setup)}">${s.setup}</div>
        <div class="chevron">▾</div>
      </div>
      ${s.notes?`<div class="card-notes">${s.notes}</div>`:''}
      <div class="player-table">${rows}</div>`;
    list.appendChild(card);
  });
}
function toggleCard(card){
  const key=`${currentMap}-${currentSide}-${card.dataset.idx}`;
  if(card.classList.contains('open')){card.classList.remove('open');delete openCards[key];}
  else{card.classList.add('open');openCards[key]=true;}
}
function filterStrats(){
  const q=document.getElementById('searchBox').value.toLowerCase(); let v=0;
  document.querySelectorAll('.strat-card').forEach(c=>{
    const pm=activePlayer?c.dataset.players.includes(activePlayer.toLowerCase()):true;
    const bm=activeBuy?c.dataset.setup===activeBuy:true;
    const qm=!q||c.dataset.name.includes(q)||c.dataset.notes.includes(q)||c.dataset.players.includes(q);
    const show=pm&&bm&&qm;
    c.classList.toggle('hidden',!show);
    if(show)v++;
    c.querySelectorAll('.player-row').forEach(r=>{
      const pn=r.querySelector('.player-name')?.textContent.trim();
      r.classList.toggle('highlight',!!activePlayer&&pn===activePlayer);
    });
  });
  document.getElementById('emptyState').style.display=
    (v===0&&!document.getElementById('comingSoon').classList.contains('show'))?'block':'none';
}
function setSide(side){
  currentSide=side;activePlayer=null;activeBuy=null;
  document.getElementById('btnT').className='tab-btn'+(side==='T'?' active-t':'');
  document.getElementById('btnCT').className='tab-btn'+(side==='CT'?' active-ct':'');
  buildPositions();buildFilters();buildBuyFilters();buildCards();filterStrats();
}
function render(){
  document.getElementById('searchBox').value='';
  buildMapTabs();buildComplexity();buildPositions();
  buildFilters();buildBuyFilters();buildCards();filterStrats();
  document.getElementById('btnT').className='tab-btn'+(currentSide==='T'?' active-t':'');
  document.getElementById('btnCT').className='tab-btn'+(currentSide==='CT'?' active-ct':'');
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
render();
loadSheet();
</script>
